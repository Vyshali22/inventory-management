<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory Management System</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; }

        /* LOGIN */
        #loginPage {
            display: flex; justify-content: center; align-items: center;
            height: 100vh; background: linear-gradient(135deg, #1E2761, #028090);
        }
        .login-box {
            background: white; padding: 40px; border-radius: 12px;
            width: 380px; box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .login-box h2 { color: #1E2761; margin-bottom: 8px; font-size: 24px; }
        .login-box p { color: #888; margin-bottom: 24px; font-size: 14px; }
        .login-box input {
            width: 100%; padding: 12px; margin-bottom: 16px;
            border: 1px solid #ddd; border-radius: 8px; font-size: 14px;
        }
        .login-box button {
            width: 100%; padding: 12px; background: #1E2761;
            color: white; border: none; border-radius: 8px;
            font-size: 16px; cursor: pointer;
        }
        .login-box button:hover { background: #028090; }
        #loginError { color: red; font-size: 13px; margin-top: 8px; }

        /* DASHBOARD */
        #dashboard { display: none; }
        .navbar {
            background: #1E2761; color: white; padding: 16px 32px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .navbar h1 { font-size: 20px; }
        .navbar button {
            background: #028090; color: white; border: none;
            padding: 8px 16px; border-radius: 6px; cursor: pointer;
        }

        .container { padding: 24px 32px; }

        /* STATS */
        .stats { display: flex; gap: 16px; margin-bottom: 24px; }
        .stat-card {
            background: white; padding: 20px 28px; border-radius: 10px;
            flex: 1; box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            border-left: 4px solid #1E2761;
        }
        .stat-card.alert { border-left-color: #e74c3c; }
        .stat-card h3 { font-size: 28px; color: #1E2761; }
        .stat-card.alert h3 { color: #e74c3c; }
        .stat-card p { color: #888; font-size: 13px; margin-top: 4px; }

        /* ADD PRODUCT */
        .add-section {
            background: white; padding: 24px; border-radius: 10px;
            margin-bottom: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        .add-section h2 { color: #1E2761; margin-bottom: 16px; font-size: 18px; }
        .form-row { display: flex; gap: 12px; flex-wrap: wrap; }
        .form-row input {
            flex: 1; min-width: 150px; padding: 10px;
            border: 1px solid #ddd; border-radius: 8px; font-size: 14px;
        }
        .form-row button {
            padding: 10px 24px; background: #1E2761; color: white;
            border: none; border-radius: 8px; cursor: pointer; font-size: 14px;
        }
        .form-row button:hover { background: #028090; }

        /* TABLE */
        .table-section {
            background: white; border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08); overflow: hidden;
        }
        .table-header {
            padding: 16px 24px; display: flex;
            justify-content: space-between; align-items: center;
            border-bottom: 1px solid #eee;
        }
        .table-header h2 { color: #1E2761; font-size: 18px; }
        .table-header button {
            background: #f0f2f5; border: none; padding: 8px 16px;
            border-radius: 6px; cursor: pointer; font-size: 13px;
        }
        table { width: 100%; border-collapse: collapse; }
        th {
            background: #f8f9fa; padding: 12px 16px;
            text-align: left; font-size: 13px; color: #555;
        }
        td { padding: 12px 16px; border-top: 1px solid #f0f0f0; font-size: 14px; }
        tr:hover { background: #f8f9fa; }
        .low-stock { color: #e74c3c; font-weight: bold; }
        .badge {
            padding: 4px 10px; border-radius: 20px; font-size: 12px;
            background: #d4edda; color: #1A7A4A;
        }
        .badge.low { background: #f8d7da; color: #e74c3c; }
        .delete-btn {
            background: #e74c3c; color: white; border: none;
            padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 12px;
        }
        .delete-btn:hover { background: #c0392b; }
        .no-data { text-align: center; padding: 40px; color: #888; }
    </style>
</head>
<body>

<!-- LOGIN PAGE -->
<div id="loginPage">
    <div class="login-box">
        <h2>Inventory Management</h2>
        <p>Sign in to your account</p>
        <input type="text" id="username" placeholder="Username" />
        <input type="password" id="password" placeholder="Password" />
        <button onclick="login()">Sign In</button>
        <div id="loginError"></div>
    </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">
    <div class="navbar">
        <h1>📦 Inventory Management System</h1>
        <button onclick="logout()">Logout</button>
    </div>

    <div class="container">
        <!-- STATS -->
        <div class="stats">
            <div class="stat-card">
                <h3 id="totalProducts">0</h3>
                <p>Total Products</p>
            </div>
            <div class="stat-card">
                <h3 id="totalStock">0</h3>
                <p>Total Stock Units</p>
            </div>
            <div class="stat-card alert">
                <h3 id="lowStockCount">0</h3>
                <p>Low Stock Alerts</p>
            </div>
        </div>

        <!-- ADD PRODUCT -->
        <div class="add-section">
            <h2>Add New Product</h2>
            <div class="form-row">
                <input type="text" id="pName" placeholder="Product Name" />
                <input type="text" id="pDesc" placeholder="Description" />
                <input type="number" id="pPrice" placeholder="Price (₹)" />
                <input type="number" id="pQty" placeholder="Quantity" />
                <input type="number" id="pThreshold" placeholder="Low Stock Alert" />
                <button onclick="addProduct()">+ Add Product</button>
            </div>
        </div>

        <!-- PRODUCTS TABLE -->
        <div class="table-section">
            <div class="table-header">
                <h2>All Products</h2>
                <button onclick="loadProducts()">🔄 Refresh</button>
            </div>
            <table>
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Description</th>
                    <th>Price</th>
                    <th>Quantity</th>
                    <th>Status</th>
                    <th>Action</th>
                </tr>
                </thead>
                <tbody id="productTable">
                <tr><td colspan="7" class="no-data">Loading...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const API = 'http://localhost:8080';
    let token = '';

    async function login() {
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;
        document.getElementById('loginError').innerText = '';

        try {
            const res = await fetch(`${API}/api/auth/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });

            if (!res.ok) {
                document.getElementById('loginError').innerText = 'Invalid username or password';
                return;
            }

            const data = await res.json();
            token = data.token;
            document.getElementById('loginPage').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            loadProducts();
        } catch (err) {
            document.getElementById('loginError').innerText = 'Connection error. Is the server running?';
        }
    }

    async function loadProducts() {
        try {
            const res = await fetch(`${API}/api/products`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const products = await res.json();

            document.getElementById('totalProducts').innerText = products.length;
            document.getElementById('totalStock').innerText =
                products.reduce((sum, p) => sum + p.quantity, 0);

            const lowStock = products.filter(p => p.quantity <= p.lowStockThreshold);
            document.getElementById('lowStockCount').innerText = lowStock.length;

            const tbody = document.getElementById('productTable');
            if (products.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" class="no-data">No products found. Add your first product!</td></tr>';
                return;
            }

            tbody.innerHTML = products.map(p => `
                <tr>
                    <td>${p.id}</td>
                    <td><strong>${p.name}</strong></td>
                    <td>${p.description || '-'}</td>
                    <td>₹${p.price.toLocaleString()}</td>
                    <td class="${p.quantity <= p.lowStockThreshold ? 'low-stock' : ''}">${p.quantity}</td>
                    <td><span class="badge ${p.quantity <= p.lowStockThreshold ? 'low' : ''}">
                        ${p.quantity <= p.lowStockThreshold ? 'Low Stock' : 'In Stock'}
                    </span></td>
                    <td><button class="delete-btn" onclick="deleteProduct(${p.id})">Delete</button></td>
                </tr>
            `).join('');
        } catch (err) {
            console.error('Error loading products:', err);
        }
    }

    async function addProduct() {
        const name = document.getElementById('pName').value;
        const description = document.getElementById('pDesc').value;
        const price = parseFloat(document.getElementById('pPrice').value);
        const quantity = parseInt(document.getElementById('pQty').value);
        const lowStockThreshold = parseInt(document.getElementById('pThreshold').value) || 10;

        if (!name || !price || !quantity) {
            alert('Please fill in Name, Price and Quantity');
            return;
        }

        await fetch(`${API}/api/products`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${token}`
            },
            body: JSON.stringify({ name, description, price, quantity, lowStockThreshold })
        });

        document.getElementById('pName').value = '';
        document.getElementById('pDesc').value = '';
        document.getElementById('pPrice').value = '';
        document.getElementById('pQty').value = '';
        document.getElementById('pThreshold').value = '';

        loadProducts();
    }

    async function deleteProduct(id) {
        if (!confirm('Are you sure you want to delete this product?')) return;
        await fetch(`${API}/api/products/${id}`, {
            method: 'DELETE',
            headers: { 'Authorization': `Bearer ${token}` }
        });
        loadProducts();
    }

    function logout() {
        token = '';
        document.getElementById('loginPage').style.display = 'flex';
        document.getElementById('dashboard').style.display = 'none';
    }
</script>
</body>
</html>
